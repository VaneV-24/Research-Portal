{% extends "base.html" %}
{% import 'bootstrap_wtf.html' as wtf %}

{% block content %}

<div class="container py-5">

    <!-- WELCOME CARD -->
    <div class="card shadow-sm mb-4">
        <div class="card-body text-center py-5">

            <h1 class="mb-3">Welcome to the Research Portal</h1>
            <p class="text-muted fs-5 mb-4">
                Sign in or create an account to explore student research opportunities.
            </p>

            <h4 class="mb-0">
                Available Positions:
                <span class="text-primary fw-bold">{{ num_positions }}</span>
            </h4>

            <div class="mt-4">
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg me-2">
                    Sign In
                </a>
                <a href="{{ url_for('auth.register_student') }}" class="btn btn-outline-primary btn-lg">
                    Student Register
                </a>
                <a href="{{ url_for('auth.register_faculty') }}" class="btn btn-outline-primary btn-lg">
                    Faculty Register
                </a>
            </div>

        </div>
    </div>

</div>

{% endblock %}
