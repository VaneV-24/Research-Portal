{% extends "base.html" %}
{% block content %}

<div class="container py-4">

    <!-- HEADER -->
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0">Coursework</h2>
                <p class="text-muted mb-0">Manage available coursework</p>
            </div>
            <a class="btn btn-primary" href="{{ url_for('main.add_coursework') }}">
                Add Coursework
            </a>
        </div>
    </div>

    <!-- COURSEWORK TABLE -->
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">All Coursework</h5>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Course #</th>
                            <th>Title</th>
                            <th style="width: 200px;" class="text-end">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for c in items %}
                        <tr>
                            <td>{{ c.coursenum }}</td>
                            <td>{{ c.title }}</td>
                            <td class="text-end">
                                <a href="{{ url_for('main.edit_coursework', coursework_id=c.id) }}" 
                                   class="btn btn-warning btn-sm me-1">
                                    Edit
                                </a>
                                <a href="{{ url_for('main.delete_coursework', coursework_id=c.id) }}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this coursework item?');">
                                    Delete
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>
        </div>
    </div>

</div>

{% endblock %}
