{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0">Majors</h2>
                <p class="text-muted mb-0">Manage available majors</p>
            </div>
            <a class="btn btn-primary" href="{{ url_for('main.add_major') }}">
                Add Major
            </a>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 200px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for major in majors %}
            <tr>
                <td>{{ major.name }}</td>
                <td>
                    <a href="{{ url_for('main.edit_major', major_id=major.id) }}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{{ url_for('main.delete_major', major_id=major.id) }}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this major?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
