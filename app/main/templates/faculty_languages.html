{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
     <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0">Programming Languages</h2>
                <p class="text-muted mb-0">Manage available programming languages</p>
            </div>
            <a class="btn btn-primary" href="{{ url_for('main.add_language') }}">
                Add Language
            </a>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 200px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for l in langs %}
            <tr>
                <td>{{ l.name }}</td>
                <td>
                    <a href="{{ url_for('main.edit_language', languages_id=l.id) }}" 
                       class="btn btn-sm btn-warning">
                        Edit
                    </a>
                    <a href="{{ url_for('main.delete_language', languages_id=l.id) }}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this language?');">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
